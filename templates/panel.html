<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard | GoldenJack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <img src="{{ url_for('static', filename='img/logo.png') }}" class="sidebar-logo" alt="GoldenJack Logo">
    <div class="menu">
        <a href="{{ url_for('panel') }}" class="active">Dashboard</a>
        <a href="{{ url_for('sucursales') }}">Sucursales</a>
        <a href="{{ url_for('puertas') }}">Puertas</a>
        <a href="{{ url_for('historial') }}">Historial</a>
        <a href="{{ url_for('configuracion') }}">Configuracion</a>
    </div>
</div>

<!-- MAIN -->
<div class="dashboard">
    <header class="header">
        <div class="header-left">
            <h1>Dashboard de Aforo</h1>
            <p>Monitoreo en tiempo real  Sensor Infrarrojo Activo</p>
        </div>
        <div class="header-right">
            <div class="time-box">
                <span id="fecha">---</span>
                <strong id="hora">---</strong>
            </div>
            <a href="/logout" class="logout">Cerrar sesion</a>
        </div>
    </header>

    <!-- SELECT -->
    <!-- Las opciones se cargan din�micamente desde /conn_puertas via JS -->
    <div class="selector-box">
        <select id="selectorPuerta" class="input-config">
            <option value="" disabled selected>Cargando puertas...</option>
        </select>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card green">
            <div class="stat-text">
                <h4>TOTAL ENTRADAS</h4>
                <h2 id="entradas">0</h2>
            </div>
            <div class="circle">?</div>
        </div>
        <div class="stat-card red">
            <div class="stat-text">
                <h4>TOTAL SALIDAS</h4>
                <h2 id="salidas">0</h2>
            </div>
            <div class="circle">?</div>
        </div>
    </div>

    <!-- MAIN CARD -->
    <div class="main-card">
        <div class="live">
            <span></span> TRANSMISION EN VIVO
        </div>
        <h2>AFORO ACTUAL</h2>
        <div class="numero" id="personas">0</div>
        <div id="sucursalActual" class="sucursal-actual">--</div>
    </div>

</div>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/panel.js') }}"></script>

</body>
</html>
